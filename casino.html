<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NEON LUXE CASINO</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root { --neon: #ff00ff; --gold: #ffd700; }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a001f;
      color: #eee;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      touch-action: manipulation;
    }
    .screen { display: none; }
    .screen.active { display: block; }

    .login-container {
      max-width: 420px;
      margin: 80px auto 40px;
      padding: 40px 25px;
      background: rgba(26, 0, 51, 0.95);
      border: 3px solid var(--neon);
      border-radius: 20px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      background: #2a0044;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1.1em;
    }
    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      background: var(--neon);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
    }
    button:active { transform: scale(0.97); }

    header {
      background: rgba(10, 0, 31, 0.98);
      backdrop-filter: blur(10px);
      border-bottom: 3px solid var(--neon);
      padding: 12px 15px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 1.65em; font-weight: bold; color: var(--neon); text-shadow: 0 0 12px var(--neon); }

    .balance-bar {
      background: rgba(0, 255, 100, 0.15);
      padding: 10px 15px;
      border-radius: 12px;
      font-size: 1.35em;
      border: 1px solid #00ff88;
    }

    .main-container { display: flex; flex-direction: column; min-height: calc(100vh - 68px); }
    .sidebar {
      background: rgba(26, 0, 51, 0.95);
      padding: 10px;
      display: flex;
      overflow-x: auto;
      gap: 8px;
      border-bottom: 1px solid #440066;
    }
    .nav-btn {
      padding: 12px 18px;
      background: transparent;
      border: 1px solid #660099;
      color: #ccc;
      border-radius: 12px;
      white-space: nowrap;
      font-size: 1.05em;
      min-width: 110px;
      text-align: center;
    }
    .nav-btn.active {
      background: var(--neon);
      color: white;
      border-color: var(--neon);
      box-shadow: 0 0 15px var(--neon);
    }

    .content { flex: 1; padding: 15px; overflow-y: auto; }

    .glass {
      background: rgba(26, 0, 51, 0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,0,255,0.3);
      border-radius: 16px;
      padding: 20px;
    }

    /* Slot Machine */
    .slot-machine {
      background: linear-gradient(#1a0033, #2a0044);
      border: 8px solid #ffd700;
      border-radius: 20px;
      padding: 20px;
      margin: 20px auto;
      max-width: 380px;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
    }
    .reels-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      background: #000;
      padding: 15px;
      border-radius: 12px;
      border: 4px solid #333;
    }
    .reel {
      width: 90px;
      height: 110px;
      background: #111;
      border: 3px solid #ffd700;
      border-radius: 10px;
      font-size: 3.8em;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
    }
    .win-flash {
      animation: winFlash 0.8s ease-in-out 3;
    }
    @keyframes winFlash {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    .promo-section { text-align: right; margin: 10px 0 15px; }
    .crash-chart-container { height: 260px; margin: 20px 0; }
    .game-screen { display: none; }
    .game-screen.active { display: block; }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen active">
    <div class="login-container">
      <h1 style="color:var(--neon); margin-bottom:5px;">NEON LUXE</h1>
      <h2>CASINO</h2>
      <input type="text" id="loginUsername" placeholder="Username" autofocus>
      <input type="password" id="loginPassword" placeholder="Password (optional)">
      <button onclick="loginUser()">Login</button>
      <button onclick="showCreateScreen()" style="background:#00cc66;">Create New Account</button>
    </div>
  </div>

  <!-- CREATE ACCOUNT SCREEN -->
  <div id="createScreen" class="screen">
    <div class="login-container">
      <h2>Create Account</h2>
      <input type="text" id="createUsername" placeholder="Choose Username">
      <input type="password" id="createPassword" placeholder="Password (optional)">
      <button onclick="createAccount()">Create Account</button>
      <button onclick="backToLogin()" style="background:#666;">Back to Login</button>
    </div>
  </div>

  <!-- MAIN CASINO -->
  <div id="mainScreen" class="screen">
    <header>
      <div class="logo">NEON LUXE CASINO</div>
      <div class="balance-bar">
        Balance: $<span id="balance">10000</span> — <span id="currentUser"></span>
        <button onclick="logout()" style="background:#ff4444; padding:6px 12px; font-size:0.9em; margin-left:10px;">Logout</button>
      </div>
    </header>

    <div class="main-container">
      <div class="sidebar" id="navContainer"></div>

      <div class="content">
        <!-- Promo Code - Far Right -->
        <div class="promo-section">
          <input type="text" id="promoCode" placeholder="Promo Code" style="max-width:200px;">
          <button onclick="redeemPromo()" style="width:auto; padding:12px 18px;">Activate</button>
        </div>

        <!-- Slots -->
        <div id="game0" class="game-screen active">
          <h2 class="glass" style="text-align:center;">🎰 SLOT MACHINE</h2>
          <div class="slot-machine" id="slotMachine">
            <div class="reels-container" id="reels">
              <div class="reel" id="reel1">🍒</div>
              <div class="reel" id="reel2">🍒</div>
              <div class="reel" id="reel3">🍒</div>
            </div>
          </div>
          <div style="text-align:center;">
            <input type="number" id="betSlots" value="100" min="10"><br><br>
            <button onclick="spinSlots()">SPIN</button>
          </div>
          <div id="slotsResult" style="text-align:center; margin-top:20px; font-size:1.6em; min-height:70px;"></div>
        </div>

        <!-- Crash Rocket -->
        <div id="game4" class="game-screen">
          <h2 class="glass" style="text-align:center;">🚀 CRASH ROCKET</h2>
          <div class="glass">
            <div class="crash-chart-container">
              <canvas id="crashChart"></canvas>
            </div>
            <div id="liveMultiplier" style="text-align:center; font-size:2.8em; font-weight:bold; margin:10px 0; color:#00ff88;">1.00x</div>
          </div>
          <div style="text-align:center; margin-top:15px;">
            <input type="number" id="betCrash" value="100" min="10"><br><br>
            <button id="betBtn" onclick="startCrash()">LAUNCH ROCKET</button>
            <button id="cashoutBtn" onclick="cashOut()" style="display:none; background:#00cc66;">CASH OUT NOW</button>
          </div>
          <div id="crashResult" style="text-align:center; margin-top:20px; font-size:1.5em; min-height:80px;"></div>
        </div>

        <!-- Leaderboard -->
        <div id="game5" class="game-screen">
          <h2 class="glass" style="text-align:center;">Who has the most motion?</h2>
          <div class="glass" id="leaderboardContent"></div>
        </div>

        <!-- Placeholders -->
        <div id="game1" class="game-screen"><h2 class="glass" style="text-align:center;">🃏 Blackjack</h2><p style="text-align:center;padding:60px;">Coming soon...</p></div>
        <div id="game2" class="game-screen"><h2 class="glass" style="text-align:center;">🎡 Roulette</h2><p style="text-align:center;padding:60px;">Coming soon...</p></div>
        <div id="game3" class="game-screen"><h2 class="glass" style="text-align:center;">🪙 Coin Flip</h2><p style="text-align:center;padding:60px;">Coming soon...</p></div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let currentData = {};
    let chart = null;
    let crashInterval = null;
    let multipliers = [], times = [];
    let currentBet = 0, currentMultiplier = 1, crashed = false;

    const symbols = ['🍒','🍋','🍊','⭐','💎','7️⃣'];

    function getAllUsers() {
      return JSON.parse(localStorage.getItem("neonLuxeUsers")) || {};
    }

    function saveAllUsers(users) {
      localStorage.setItem("neonLuxeUsers", JSON.stringify(users));
    }

    function loginUser() {
      const username = document.getElementById('loginUsername').value.trim();
      if (!username) return alert("Please enter a username");

      const users = getAllUsers();
      if (users[username]) {
        currentUser = username;
        currentData = users[username];
        enterMainScreen();
      } else {
        alert("Account not found. Please create a new account.");
      }
    }

    function showCreateScreen() {
      document.getElementById('loginScreen').classList.remove('active');
      document.getElementById('createScreen').classList.add('active');
    }

    function backToLogin() {
      document.getElementById('createScreen').classList.remove('active');
      document.getElementById('loginScreen').classList.add('active');
    }

    function createAccount() {
      const username = document.getElementById('createUsername').value.trim();
      if (!username) return alert("Username is required");

      const users = getAllUsers();
      if (users[username]) return alert("Username already taken!");

      users[username] = {
        balance: 10000,
        isFiveX: false,
        promoUsed: false,
        totalSpins: 0,
        totalBets: 0,
        totalWins: 0,
        biggestWin: 0
      };

      saveAllUsers(users);
      currentUser = username;
      currentData = users[username];
      enterMainScreen();
      alert(`Welcome to Neon Luxe, ${username}!`);
    }

    function enterMainScreen() {
      document.getElementById('loginScreen').classList.remove('active');
      document.getElementById('createScreen').classList.remove('active');
      document.getElementById('mainScreen').classList.add('active');
      document.getElementById('currentUser').textContent = currentUser;
      document.getElementById('balance').textContent = currentData.balance.toLocaleString();
      createNav();
      updateLeaderboard();
    }

    function logout() {
      saveUserData();
      location.reload();
    }

    function saveUserData() {
      if (!currentUser) return;
      const users = getAllUsers();
      users[currentUser] = currentData;
      saveAllUsers(users);
    }

    function redeemPromo() {
      if (currentData.promoUsed) return alert("You have already used a promo code.");
      const code = document.getElementById('promoCode').value.trim().toUpperCase();
      if (code === "NEON5X" || code === "5X") {
        currentData.isFiveX = true;
        currentData.promoUsed = true;
        saveUserData();
        alert("🎉 5X LUCK ACTIVATED!");
      } else {
        alert("Invalid promo code.");
      }
    }

    function createNav() {
      const nav = document.getElementById('navContainer');
      nav.innerHTML = "";
      const names = ["🎰 Slots", "🃏 Blackjack", "🎡 Roulette", "🪙 Coin", "🚀 Crash", "🏆 Leaderboard"];
      names.forEach((name, i) => {
        const btn = document.createElement('button');
        btn.className = 'nav-btn';
        btn.textContent = name;
        btn.onclick = () => switchGame(i);
        if (i === 0) btn.classList.add('active');
        nav.appendChild(btn);
      });
    }

    function switchGame(n) {
      document.querySelectorAll('.game-screen').forEach(g => g.classList.remove('active'));
      document.getElementById(`game${n}`).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === n));
      if (n === 5) updateLeaderboard();
    }

    function playWinSound() {
      try {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = 'sine';
        osc.frequency.value = 800;
        gain.gain.value = 0.4;
        osc.connect(gain).connect(audio.destination);
        osc.start();
        setTimeout(() => osc.stop(), 250);
      } catch(e) {}
    }

    // Slots
    function spinSlots() {
      const bet = parseInt(document.getElementById('betSlots').value) || 100;
      if (bet > currentData.balance || bet < 10) return alert("Invalid bet!");

      currentData.balance -= bet;
      currentData.totalBets += bet;
      currentData.totalSpins++;

      const reel1 = document.getElementById('reel1');
      const reel2 = document.getElementById('reel2');
      const reel3 = document.getElementById('reel3');
      const machine = document.getElementById('slotMachine');

      let spins = 0;
      const interval = setInterval(() => {
        reel1.textContent = symbols[Math.floor(Math.random()*6)];
        reel2.textContent = symbols[Math.floor(Math.random()*6)];
        reel3.textContent = symbols[Math.floor(Math.random()*6)];
        spins++;
        if (spins > 16) clearInterval(interval);
      }, 70);

      setTimeout(() => {
        const r = Array(3).fill().map(() => symbols[Math.floor(Math.random()*6)]);
        reel1.textContent = r[0];
        reel2.textContent = r[1];
        reel3.textContent = r[2];

        let win = 0;
        if (r[0] === r[1] && r[1] === r[2]) {
          win = (r[0] === '7️⃣' ? 200 : 50) * bet;
        } else if (r[0] === r[1] || r[1] === r[2]) {
          win = currentData.isFiveX ? bet * 15 : bet * 5;
        }

        if (win > 0) {
          currentData.balance += win;
          currentData.totalWins += win;
          if (win > currentData.biggestWin) currentData.biggestWin = win;
          document.getElementById('slotsResult').innerHTML = `🎉 JACKPOT! +$${win}`;
          machine.classList.add('win-flash');
          playWinSound();
          setTimeout(() => machine.classList.remove('win-flash'), 2500);
        } else {
          document.getElementById('slotsResult').innerHTML = "No win this spin";
        }

        document.getElementById('balance').textContent = currentData.balance.toLocaleString();
        saveUserData();
        updateLeaderboard();
      }, 1250);
    }

    // Crash Game (simplified but functional)
    function initCrashChart() {
      if (chart) chart.destroy();
      chart = new Chart(document.getElementById('crashChart'), {
        type: 'line',
        data: { labels: times, datasets: [{ label: 'Multiplier', data: multipliers, borderColor: '#00ffcc', borderWidth: 3, tension: 0.4, pointRadius: 0 }] },
        options: { animation: { duration: 100 }, plugins: { legend: { display: false }}, scales: { x: { title: { display: true, text: 'Time (s)' }}, y: { beginAtZero: true }}}
      });
    }

    function startCrash() {
      const bet = parseInt(document.getElementById('betCrash').value) || 100;
      if (bet > currentData.balance || bet < 10) return alert("Invalid bet!");

      currentData.balance -= bet;
      document.getElementById('balance').textContent = currentData.balance.toLocaleString();

      currentBet = bet;
      currentMultiplier = 1;
      multipliers = [1];
      times = [0];
      crashed = false;

      document.getElementById('betBtn').style.display = 'none';
      document.getElementById('cashoutBtn').style.display = 'inline-block';
      document.getElementById('crashResult').innerHTML = '';

      if (!chart) initCrashChart();

      let time = 0;
      crashInterval = setInterval(() => {
        time += 0.15;
        currentMultiplier += (Math.random() * 0.25) + (currentData.isFiveX ? 0.18 : 0.09);
        multipliers.push(currentMultiplier);
        times.push(time.toFixed(1));
        chart.update();
        document.getElementById('liveMultiplier').textContent = currentMultiplier.toFixed(2) + 'x';

        if (currentMultiplier > 2 && Math.random() < (currentData.isFiveX ? 0.009 : 0.025)) crash();
      }, 85);
    }

    function cashOut() {
      if (crashed) return;
      clearInterval(crashInterval);
      const win = Math.floor(currentBet * currentMultiplier * (currentData.isFiveX ? 1.6 : 1));
      currentData.balance += win;
      document.getElementById('balance').textContent = currentData.balance.toLocaleString();
      document.getElementById('crashResult').innerHTML = `✅ CASHED OUT @ <strong>${currentMultiplier.toFixed(2)}x</strong><br>+$${win}`;
      resetCrash();
      saveUserData();
    }

    function crash() {
      crashed = true;
      clearInterval(crashInterval);
      document.getElementById('liveMultiplier').innerHTML = `<span style="color:#ff3366;">💥 CRASHED @ ${currentMultiplier.toFixed(2)}x</span>`;
      document.getElementById('crashResult').innerHTML = "Rocket crashed. Bet lost.";
      resetCrash();
    }

    function resetCrash() {
      document.getElementById('betBtn').style.display = 'inline-block';
      document.getElementById('cashoutBtn').style.display = 'none';
      setTimeout(() => {
        multipliers = [1]; times = [0];
        if (chart) chart.update();
        document.getElementById('liveMultiplier').textContent = '1.00x';
      }, 2500);
    }

    function updateLeaderboard() {
      const users = getAllUsers();
      let list = Object.keys(users).map(name => ({
        name: name,
        balance: users[name].balance || 0
      }));
      list.sort((a,b) => b.balance - a.balance);

      let html = `<ol style="font-size:1.25em; line-height:2;">`;
      list.forEach(p => {
        html += `<li><strong>${p.name}</strong> — $${p.balance.toLocaleString()}</li>`;
      });
      html += `</ol>`;
      document.getElementById('leaderboardContent').innerHTML = html;
    }

    window.onload = () => {
      document.getElementById('loginScreen').classList.add('active');
    };
  </script>
</body>
</html>
